interface=wlan0
bind-interfaces

# DHCP: asigna IPs a los clientes (GCS laptop, etc.)
dhcp-range=192.168.100.10,192.168.100.50,255.255.255.0,24h

# Gateway y DNS apuntan al rover
dhcp-option=3,192.168.100.1
dhcp-option=6,192.168.100.1

# Resolver olympus-rover.local localmente
address=/olympus-rover.local/192.168.100.1

# No reenviar peticiones DNS upstream (sin internet en modo field)
no-resolv
server=8.8.8.8
